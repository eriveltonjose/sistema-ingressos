<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Comprar Ingresso</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
            padding:40px;
        }

        .box{
            background:white;
            padding:30px;
            max-width:500px;
            margin:auto;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
        }

        button{
            background:green;
            color:white;
            border:none;
            padding:12px;
            width:100%;
            cursor:pointer;
        }
@media (max-width: 768px) {

    body{
        padding:20px;
    }

    .box, .container, form{
        width:100%;
        max-width:100%;
        box-sizing:border-box;
    }

    input, select, button{
        width:100%;
        box-sizing:border-box;
        font-size:16px;
    }

    h1{
        font-size:28px;
        text-align:center;
    }

    .btn, button{
        padding:14px;
        font-size:16px;
    }
}

    </style>

</head>
<body>

<div class="box">

    <h1>{{ evento.nome }}</h1>
    <p>
        <strong>Ingressos disponiveis:</strong>
        {{ disponiveis }}
    </p>

{% if messages %}
    {% for message in messages %}
        <div style="background:#ffdddd; color:#900; padding:10px; margin-bottom:15px; border-radius:5px;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

    <p>{{ evento.descricao }}</p>

    <form method="POST">

    {% csrf_token %}

    <input
        type="number"
        name="quantidade"
        placeholder="Quantidade de ingressos"
        min="1"
        max="{{ disponiveis }}"
        value="1"
        required
    >

    <input
        type="text"
        name="nome"
        placeholder="Seu nome"
        required
    >

    <input
        type="email"
        name="email"
        placeholder="Seu e-mail"
        required
    >

    <input
        type="text"
        name="telefone"
        placeholder="Telefone"
        inputmode="numeric"
        required
    >

    <input
        type="text"
        name="cpf"
        placeholder="CPF"
        maxlength="11"
        pattern="[0-9]{11}"
        inputmode="numeric"
        required
    >

    {% if disponiveis > 0 %}

        <button type="submit">
            Finalizar Compra
        </button>

    {% else %}

        <button type="button" disabled>
            Esgotado
        </button>

    {% endif %}

    </form>

</div>

</body>
</html>
