<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar Ingresso</title>

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f6f9;
            color:#222;
            padding:30px 15px;
        }

        .box{
            background:white;
            width:100%;
            max-width:560px;
            margin:auto;
            padding:35px;
            border-radius:16px;
            box-shadow:0 8px 25px rgba(0,0,0,0.10);
        }

	.banner-topo{
   	    width:100%;
    	    margin-bottom:25px;
	}

	.banner-topo img{
    	    width:100%;
    	    border-radius:14px;
    	    object-fit:cover;
    	    max-height:320px;
    	    box-shadow:0 4px 15px rgba(0,0,0,0.15);
	}

        h1{
            margin-top:0;
            font-size:30px;
            line-height:1.2;
            text-align:center;
        }

        .info{
            background:#f1f5ff;
            border-left:5px solid #0d6efd;
            padding:14px;
            border-radius:8px;
            margin-bottom:20px;
        }

        .descricao{
            font-size:16px;
            line-height:1.5;
            margin-bottom:25px;
            text-align:center;
        }

        .alerta{
            background:#ffdddd;
            color:#900;
            padding:12px;
            margin-bottom:15px;
            border-radius:8px;
            font-weight:bold;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:6px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        input:focus{
            outline:none;
            border-color:#0d6efd;
            box-shadow:0 0 0 3px rgba(13,110,253,0.15);
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:15px;
            width:100%;
            cursor:pointer;
            border-radius:10px;
            font-size:17px;
            font-weight:bold;
        }

        button:hover{
            background:#0b5ed7;
        }

        button:disabled{
            background:#999;
            cursor:not-allowed;
        }

        .voltar{
            display:block;
            text-align:center;
            margin-top:18px;
            color:#0d6efd;
            text-decoration:none;
            font-weight:bold;
        }

        @media (max-width: 768px){
            body{
                padding:18px 12px;
            }

            .box{
                padding:25px 20px;
                border-radius:14px;
            }

            h1{
                font-size:24px;
            }

            input, button{
                font-size:16px;
            }
        }
    </style>
</head>

<body>

<div class="box">

    {% if evento.banner %}
    <div class="banner-topo">
        <img src="{{ evento.banner.url }}" alt="{{ evento.nome }}">
    </div>
    {% endif %}

    <h1>{{ evento.nome }}</h1>


    {% if messages %}
        {% for message in messages %}
            <div class="alerta">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <p class="descricao">{{ evento.descricao }}</p>

    <form method="POST">
        {% csrf_token %}

        <label>Quantidade de ingressos</label>
        <input
            type="number"
            name="quantidade"
            min="1"
            max="{{ disponiveis }}"
            value="1"
            required
        >

        <label>Nome completo</label>
        <input
            type="text"
            name="nome"
            placeholder="Digite seu nome"
            required
        >

        <label>E-mail</label>
        <input
            type="email"
            name="email"
            placeholder="Digite seu e-mail"
            required
        >

        <label>Telefone</label>
        <input
            type="text"
            name="telefone"
            placeholder="Somente números"
            inputmode="numeric"
            pattern="[0-9]+"
            required
        >

        <label>CPF</label>
        <input
            type="text"
            name="cpf"
            placeholder="Somente números"
            maxlength="11"
            pattern="[0-9]{11}"
            inputmode="numeric"
            required
        >

        {% if disponiveis > 0 %}
            <button type="submit">
                Finalizar compra
            </button>
        {% else %}
            <button type="button" disabled>
                Ingressos esgotados
            </button>
        {% endif %}
    </form>

    <a href="/" class="voltar">← Voltar para eventos</a>

</div>

</body>
</html>
