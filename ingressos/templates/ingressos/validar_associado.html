<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Associado AMBr</title>

    <style>

        body{
            margin:0;
            padding:40px 16px;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f6f9;
        }

        .container{
            max-width:700px;
            margin:0 auto;
        }

        .card{
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 4px 18px rgba(0,0,0,0.10);
        }

        h1{
            text-align:center;
            margin-bottom:15px;
        }

        p{
            text-align:center;
            font-size:18px;
            margin-bottom:25px;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:8px;
        }

        input{
            width:100%;
            padding:14px;
            font-size:18px;
            border:1px solid #ccc;
            border-radius:10px;
            box-sizing:border-box;
        }

        .btn{
            display:block;
            width:100%;
            margin-top:20px;
            background:#198754;
            color:white;
            text-decoration:none;
            text-align:center;
            border:none;
            padding:16px;
            font-size:22px;
            font-weight:bold;
            border-radius:12px;
            cursor:pointer;
        }

        .btn:hover{
            background:#157347;
        }

        .evento{
            text-align:center;
            font-size:22px;
            font-weight:bold;
            margin-bottom:25px;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="card">

        <h1>Associado AMBr</h1>

        <div class="evento">
            {{ evento.nome }}
        </div>

        {% if associado %}

            <p style="color:green; font-weight:bold;">
                ✔ Associado localizado
            </p>

            <div style="font-size:20px; line-height:1.8;">

                <p>
                    <strong>Nome:</strong>
                    {{ associado.nome }}
                </p>

                <p>
                    <strong>CRM:</strong>
                    {{ associado.crm }}
                </p>

                <p>
                    <strong>E-mail:</strong>
                    eriv***@gmail.com
                </p>

                <p>
                    <strong>Celular:</strong>
                    6199****39
                </p>

            </div>

            <form method="post" action="/enviar-codigo/{{ evento.id }}/">
                {% csrf_token %}

                <button type="submit" class="btn">
                    Enviar código para o e-mail
                </button>
            </form>

        {% else %}

            <p>
                Informe seu CPF para validar seu cadastro de associado.
            </p>

            <form method="post">
                {% csrf_token %}

                <label>CPF</label>

                <input
                    type="text"
                    name="cpf"
                    maxlength="14"
                    placeholder="000.000.000-00"
                    required
                >

                <button type="submit" class="btn">
                    Validar Cadastro
                </button>

            </form>

        {% endif %}

    </div>

</div>

</body>
</html>
