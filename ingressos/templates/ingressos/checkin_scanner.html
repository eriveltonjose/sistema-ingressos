<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Check-in QR Code</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            text-align:center;
            padding:0;
            margin:0;
        }

        .box{
            width:100%;
            max-width:none;
            min-height:100vh;
            background:white;
            padding:15px;
            box-sizing:border-box;
        }

        #reader{
            width:100%;
            max-width:100%;
            margin-top:10px;
        }

        #reader video{
            width:100% !important;
            height:75vh !important;
            object-fit:cover;
            border-radius:12px;
        }

        .ok{
            background:#d4edda;
            color:#155724;
            padding:15px;
            border-radius:8px;
            margin-top:20px;
            font-weight:bold;
        }

        .erro{
            background:#f8d7da;
            color:#721c24;
            padding:15px;
            border-radius:8px;
            margin-top:20px;
            font-weight:bold;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 20px;
            background:#007bff;
            color:white;
            text-decoration:none;
            border-radius:8px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Check-in do Evento</h1>

    <p>Aponte a câmera para o QR Code do ingresso.</p>

    <div id="reader"></div>

    <div id="resultado"></div>

    <a href="/vendidos/" class="btn">
        Ver painel de vendidos
    </a>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    let jaLeu = false;
    let html5QrCode = null;

    function extrairCodigo(decodedText) {
        let texto = decodedText.trim();

        if (texto.includes("/validar/")) {
            texto = texto.split("/validar/")[1];
        }

        texto = texto.split("?")[0].replaceAll("/", "").trim();
        return texto;
    }

    function sucesso(decodedText) {
        if (jaLeu) return;

        const codigo = extrairCodigo(decodedText);

        const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;

        if (!uuidRegex.test(codigo)) {
            document.getElementById("resultado").innerHTML =
                '<div class="erro">QR Code inválido.</div>';
            return;
        }

        jaLeu = true;

        document.getElementById("resultado").innerHTML =
            '<div class="ok">QR Code lido com sucesso! Redirecionando...</div>';

        html5QrCode.stop().then(() => {
            window.location.href = "/validar/" + codigo + "/";
        });
    }

    function iniciarScanner() {
        html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            { facingMode: "environment" },
            {
                fps: 10,
                qrbox: function(viewfinderWidth, viewfinderHeight) {
                    const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                    const qrboxSize = Math.floor(minEdge * 0.85);
                    return {
                        width: qrboxSize,
                        height: qrboxSize
                    };
                },
                aspectRatio: 0.75
            },
            sucesso,
            function(errorMessage) {
                // ignora erros de leitura contínua
            }
        ).catch(function(err) {
            document.getElementById("resultado").innerHTML =
                '<div class="erro">Não foi possível acessar a câmera. Verifique a permissão do navegador.</div>';
        });
    }

    window.onload = iniciarScanner;
</script>

</body>
</html>
