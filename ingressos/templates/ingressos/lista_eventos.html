<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Eventos Disponíveis</title>

    <style>

        body{
            margin:0;
            padding:40px 16px;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f6f9;
            color:#222;
        }
        
        .container{
            width:100%;
            max-width:760px;
            margin:0 auto;
        }
        
        h1{
            text-align:center;
            margin-bottom:24px;
            font-size:28px;
        }
        
        .banner{
            text-align:center;
            margin-bottom:28px;
        }
        
        .banner img{
            width:100%;
            max-width:700px;
            border-radius:16px;
            box-shadow:0 6px 20px rgba(0,0,0,0.18);
        }
        
        .evento{
            background:white;
            padding:32px;
            border-radius:18px;
            margin-bottom:30px;
            box-shadow:0 4px 18px rgba(0,0,0,0.10);
        }
        
        .evento h2{
            font-size:34px;
            line-height:1.15;
            text-align:center;
            margin-bottom:24px;
            font-weight:700;
        }
        
        .evento p{
            font-size:22px;
            line-height:1.6;
            text-align:center;
            margin-bottom:18px;
        }
        
        .btn{
            display:block;
            width:100%;
            max-width:340px;

            background:#0d6efd;
            color:white;

            text-decoration:none;
            text-align:center;

            padding:20px;
            font-size:32px;
            font-weight:bold;

            border-radius:14px;

            margin:26px auto 0 auto;

            transition:0.3s;            
        }
        
        .btn:hover{
            background:#0b5ed7;
        }
        
        @media (max-width: 768px){
        
            body{
                padding:28px 10px;
                background:#f4f6f9;
            }
        
            .container{
                width:100%;
                max-width:100%;
                margin:0 auto;
            }
        
            h1{
                font-size:22px;
                margin-bottom:18px;
            }
        
            .banner{
                margin-bottom:26px;
            }
        
            .banner img{
                width:100%;
                max-width:100%;
                border-radius:16px;
                display:block;
            }
        
            .evento{
                width:100%;
                padding:28px 22px;
                border-radius:18px;
                margin:0 auto 24px auto;
                box-sizing:border-box;
                text-align:center;
            }
        
            .evento h2{
                font-size:32px;
                line-height:1.15;
                text-align:center;
                margin-bottom:22px;
            }
        
            .evento p{
                font-size:20px;
                line-height:1.55;
                text-align:center;
            }
        
            
            .valor-evento{
                text-align:center;
                font-size:24px;
                font-weight:600;
            }
	.descricao-evento{
	    font-size:22px;
	    line-height:1.8;
    	    text-align:center;
    	    margin-bottom:22px;
    	    width:100%;
	}

	.descricao-evento *{
    	    text-align:center !important;
	}

	.descricao-evento br{
    	    display:block;
    	    margin-bottom:12px;
    	    content:"";
	}

    	.local-evento{
      	    text-align:center;
            font-size:22px;
            line-height:1.6;
    	}			
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Eventos Disponíveis</h1>

    
{% for evento in eventos %}

    {% if evento.banner %}
        <div class="banner">
            <img src="{{ evento.banner.url }}" alt="{{ evento.nome }}">
        </div>
    {% endif %}

    <div class="evento">
        <h2>{{ evento.nome }}</h2>

        <div class="descricao-evento">
            {{ evento.descricao|linebreaksbr }}
        </div>

        <p class="local-evento">
    	    <strong>Local:</strong>
    	    {{ evento.local }}	
        </p>

        <p class="valor-evento">
            <strong>Valor:</strong> R$ {{ evento.valor }}
        </p>

        <a href="/comprar/{{ evento.id }}/" class="btn">
            Comprar Ingresso
        </a>
    </div>

{% endfor %}


</div>

</body>
</html>
