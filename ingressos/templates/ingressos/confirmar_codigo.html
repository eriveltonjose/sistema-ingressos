<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Código</title>

    <style>

        body{
            margin:0;
            padding:40px 16px;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f6f9;
        }

        .container{
            max-width:700px;
            margin:0 auto;
        }

        .card{
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 4px 18px rgba(0,0,0,0.10);
        }

        h1{
            text-align:center;
            margin-bottom:15px;
        }

        .evento{
            text-align:center;
            font-size:22px;
            font-weight:bold;
            margin-bottom:25px;
        }

        p{
            text-align:center;
            font-size:18px;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:16px;
            font-size:24px;
            text-align:center;
            letter-spacing:6px;
            border:1px solid #ccc;
            border-radius:10px;
            box-sizing:border-box;
        }

        .btn{
            display:block;
            width:100%;
            margin-top:20px;
            background:#198754;
            color:white;
            border:none;
            padding:16px;
            font-size:22px;
            font-weight:bold;
            border-radius:12px;
            cursor:pointer;
        }

        .btn:hover{
            background:#157347;
        }

        .mensagem{
            margin-bottom:20px;
            padding:15px;
            border-radius:10px;
            font-weight:bold;
            text-align:center;
            background:#f8d7da;
            color:#721c24;
        }

        .alerta{
            background:#f8d7da;
            color:#842029;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
            text-align:center;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="card">

        <h1>Confirmar Código</h1>

        <div class="evento">
            {{ evento.nome }}
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mensagem">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <p>
            Digite o código enviado para seu e-mail.
        </p>

        <form method="post" action="/confirmar-codigo/{{ evento.id }}/">
            {% csrf_token %}

            <input
                type="text"
                name="codigo"
                maxlength="6"
                placeholder="000000"
                required
            >

            <button type="submit" class="btn">
                Confirmar Código
            </button>

        </form>

    </div>

</div>

</body>
</html>
